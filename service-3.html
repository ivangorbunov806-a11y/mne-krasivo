<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Косметология — Мне Красиво</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .sp-wrap { max-width: 900px; margin: 0 auto; padding: 0 var(--pad-x); }

    /* Header */
    .sp-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem var(--pad-x);
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }
    .sp-back {
      font-family: var(--ff-body); font-size: 0.65rem; font-weight: 400;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted); text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem;
      transition: color 0.25s;
    }
    .sp-back:hover { color: var(--text); }
    .sp-logo-link { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .sp-logo-icon { width: 28px; height: auto; }
    .sp-logo-name {
      font-family: var(--ff-body); font-size: 0.65rem; font-weight: 400;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--text);
    }

    /* Hero */
    .sp-hero {
      padding: clamp(4rem, 10vw, 7rem) 0 clamp(2rem, 5vw, 3.5rem);
    }
    .sp-num {
      display: block;
      font-family: var(--ff-body); font-size: 0.6rem; font-weight: 400;
      letter-spacing: 0.25em; color: var(--text-dim);
      margin-bottom: 1rem;
    }
    .sp-title {
      font-family: var(--ff-display); font-style: italic; font-weight: 300;
      font-size: clamp(2.5rem, 7vw, 5.5rem); line-height: 1.05;
      color: var(--text);
    }

    /* Photo placeholder */
    .sp-photo {
      width: 100%; aspect-ratio: 16/9;
      background: var(--bg3);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.75rem;
      border: 1px dashed rgba(28,15,6,0.15);
      margin-bottom: clamp(2.5rem, 6vw, 4rem);
    }
    .sp-photo-icon {
      width: 40px; height: 40px; opacity: 0.25;
    }
    .sp-photo-label {
      font-family: var(--ff-body); font-size: 0.65rem; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-dim);
    }

    /* Description */
    .sp-desc {
      padding-bottom: clamp(3rem, 8vw, 6rem);
      border-bottom: 1px solid var(--line);
      margin-bottom: clamp(2.5rem, 6vw, 4rem);
    }
    .sp-desc p {
      font-family: var(--ff-body); font-size: clamp(0.95rem, 1.5vw, 1.1rem);
      font-weight: 300; line-height: 1.75; color: var(--text-muted);
      max-width: 560px;
    }

    /* CTA */
    .sp-actions { padding-bottom: clamp(4rem, 10vw, 8rem); }
    .sp-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.85rem 2.25rem;
      border: 1px solid rgba(28,15,6,0.25);
      font-family: var(--ff-body); font-size: 0.62rem; font-weight: 400;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text); text-decoration: none;
      transition: background 0.25s, border-color 0.25s;
    }
    .sp-btn:hover { background: var(--bg2); border-color: rgba(28,15,6,0.4); }

    /* Whatsapp CTA */
    .sp-whatsapp {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.85rem 2.25rem; margin-left: 1rem;
      background: var(--accent);
      font-family: var(--ff-body); font-size: 0.62rem; font-weight: 400;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--bg); text-decoration: none;
      transition: background 0.25s;
    }
    .sp-whatsapp:hover { background: var(--accent-lt); }

    @media (max-width: 600px) {
      .sp-actions { display: flex; flex-direction: column; gap: 0.75rem; }
      .sp-whatsapp { margin-left: 0; }
    }
  </style>
</head>
<body>

<header class="sp-header">
  <a href="index.html#services" class="sp-back">
    <svg width="14" height="10" viewBox="0 0 14 10" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 1L1 5L5 9M1 5H13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Все услуги
  </a>
  <a href="index.html" class="sp-logo-link">
    <img src="images/logo-icon-black.png" class="sp-logo-icon" alt="">
    <span class="sp-logo-name">Мне Красиво</span>
  </a>
</header>

<main>
  <div class="sp-wrap">

    <div class="sp-hero">
      <span class="sp-num">003</span>
      <h1 class="sp-title">Косметология</h1>
    </div>

    <div class="sp-photo">
      <svg class="sp-photo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="7" width="34" height="26" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="6" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="31" cy="12" r="2" fill="currentColor" opacity="0.4"/>
      </svg>
      <span class="sp-photo-label">Фото скоро появится</span>
    </div>

    <div class="sp-desc">
      <p>Здесь скоро появится подробное описание услуги и фотографии.</p>
    </div>

    <div class="sp-actions">
      <a href="index.html#services" class="sp-btn">← Все услуги</a>
      <a href="https://wa.me/79279782022" class="sp-whatsapp" target="_blank">Записаться →</a>
    </div>

  </div>
</main>

</body>
</html>
